name: samanak

services:

  postgres:
    image: postgres:17
    container_name: samanak-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: samanak
      POSTGRES_USER: samanak
      POSTGRES_PASSWORD: samanak
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U samanak"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - samanak

  redis:
    image: redis:7-alpine
    container_name: samanak-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - samanak

  rabbitmq:
    image: rabbitmq:4-management
    container_name: samanak-rabbitmq
    restart: unless-stopped
    ports:
      - "5672:5672"
      - "15672:15672"
    networks:
      - samanak

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.18.0
    container_name: samanak-elasticsearch
    restart: unless-stopped
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: "-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    networks:
      - samanak

  minio:
    image: minio/minio
    container_name: samanak-minio
    command: server /data --console-address ":9001"
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: changeme123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    networks:
      - samanak

  backend:
    build:
      context: ./backend
    container_name: samanak-backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    volumes:
      - ./backend:/app
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8000:8000"
    command: >
      python manage.py runserver 0.0.0.0:8000
    networks:
      - samanak

volumes:
  postgres_data:
  minio_data:

networks:
  samanak:
