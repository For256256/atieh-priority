version: "3.9"

services:

  postgres:
    image: postgres:17
    container_name: samanak-postgres
    restart: always
    environment:
      POSTGRES_DB: samanak
      POSTGRES_USER: samanak
      POSTGRES_PASSWORD: samanak
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: samanak-redis
    restart: always
    ports:
      - "6379:6379"

  rabbitmq:
    image: rabbitmq:4-management
    container_name: samanak-rabbitmq
    restart: always
    ports:
      - "5672:5672"
      - "15672:15672"

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    container_name: samanak-minio
    restart: always
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: changeme123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.18.0
    container_name: samanak-es
    restart: always
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
    ports:
      - "9200:9200"

volumes:
  postgres_data:
  minio_data:
